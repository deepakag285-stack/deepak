<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Detail Boxes</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 30px;
            flex-wrap: wrap;
            padding: 20px;
        }

        /* --- Card Styles --- */
        .card {
            width: 300px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            color: white;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.25);
        }

        /* Distinct Colors for Boxes */
        .card-1 {
            background: linear-gradient(135deg, #ff007f, #ff758c);
        }

        .card-2 {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 3px solid rgba(255,255,255,0.2);
        }

        .card-body {
            padding: 20px;
        }

        .card-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .card-text {
            font-size: 0.95rem;
            opacity: 0.9;
            line-height: 1.4;
        }

        /* --- Modal/Popup Styles --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: white;
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            color: #333;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-title {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #111;
        }

        .modal-desc {
            font-size: 1rem;
            line-height: 1.6;
            color: #555;
        }

        /* --- Animated X Close Button --- */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: #333;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        /* Dynamic background color matching the active card color on hover */
        .close-btn:hover {
            transform: rotate(180deg);
            background: #ff007f; /* Fallback/Default dynamic target */
        }

        /* Creating the X lines */
        .close-btn::before, .close-btn::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 3px;
            background-color: white;
            border-radius: 2px;
        }

        .close-btn::before {
            transform: rotate(45deg);
        }

        .close-btn::after {
            transform: rotate(-45deg);
        }
    </style>
</head>
<body>

    <div class="card card-1" onclick="openModal('Neon Paradise', 'Welcome to the vibrant world of Neon Paradise! This space explores high-contrast design, futuristic aesthetics, and bold color palettes that push creative boundaries.', '#ff007f')">
        <img src="https://picsum.photos/300/200?random=1" alt="Neon Paradise" class="card-img">
        <div class="card-body">
            <h2 class="card-title">Neon Paradise</h2>
            <p class="card-text">Click to explore the vivid landscapes and futuristic color theories driving modern digital art.</p>
        </div>
    </div>

    <div class="card card-2" onclick="openModal('Deep Ocean', 'Dive deep into the tranquil abyss. This section uncovers the soothing psychology behind cool tones, fluid grid layouts, and minimalist user interfaces.', '#0072ff')">
        <img src="https://picsum.photos/300/200?random=2" alt="Deep Ocean" class="card-img">
        <div class="card-body">
            <h2 class="card-title">Deep Ocean</h2>
            <p class="card-text">Click to submerge into the serene depths of minimalist design and calm color harmonies.</p>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="close-btn" id="modalCloseBtn" onclick="closeModal(null)"></div>
            <h2 class="modal-title" id="modalTitle">Title</h2>
            <p class="modal-desc" id="modalDesc">Detailed content goes here...</p>
        </div>
    </div>

    <script>
        const modalOverlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        const modalCloseBtn = document.getElementById('modalCloseBtn');

        // Function to open the modal with dynamic content
        function openModal(title, description, themeColor) {
            modalTitle.innerText = title;
            modalDesc.innerText = description;
            
            // Set the close button hover color to match the clicked box theme
            modalCloseBtn.style.setProperty('--hover-color', themeColor);
            
            // Apply specific hover style via JS dynamically
            modalCloseBtn.onmouseenter = () => modalCloseBtn.style.backgroundColor = themeColor;
            modalCloseBtn.onmouseleave = () => modalCloseBtn.style.backgroundColor = '#333';

            modalOverlay.classList.add('active');
        }

        // Function to close the modal
        function closeModal(event) {
            // If event exists, ensure it only triggers when clicking the overlay background
            if (event && event.target !== modalOverlay) return;
            
            modalOverlay.classList.remove('active');
        }
    </script>
</body>
</html>
