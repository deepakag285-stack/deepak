<!DOCTYPE html>
<html>
<head>

<title>Busy Dates</title>

<style>

body{
font-family:Arial;
text-align:center;
padding-top:50px;
}

input{
padding:10px;
font-size:18px;
}

button{
padding:10px 20px;
margin-top:15px;
font-size:18px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Select Date</h2>

<input type="date" id="date">

<br>

<button onclick="checkDate()">
Check Availability
</button>

<div id="result"></div>

<script>

const busyDates = [

"2026-06-10",

"2026-06-15",

"2026-06-20"

];

function checkDate(){

let selected =
document.getElementById("date").value;

if(busyDates.includes(selected)){

document.getElementById("result")
.innerHTML =
"❌ This Date is Busy";

}else{

document.getElementById("result")
.innerHTML =
"✅ Date Available";

}

}

</script>

</body>
</html>
